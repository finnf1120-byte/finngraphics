<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finn Graphics — Admin</title>
  <!-- Netlify Identity: handles the actual login. This is what checks the
       username/password — nothing on this page or in this site's own code
       ever sees or stores a password. -->
  <script defer src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Decap CMS (formerly Netlify CMS) — reads config.yml in this folder
       and turns your data/*.json files into an editable admin UI. -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Send people straight to the login prompt if they land here signed out,
    // and bounce back to the homepage after logging out.
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", (user) => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
      window.netlifyIdentity.on("logout", () => {
        document.location.href = "/";
      });
    }
  </script>
</body>
</html>
